<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>الصفحة غير موجودة — شمس النيل</title>
<meta name="robots" content="noindex, follow">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--amber:#EF9F27;--blue:#378ADD;--dark:#1C1A14;--dark2:#252218;--border:#3A3528;--text:#F5F0E8;--text-muted:#A89F8C;--text-dim:#6B6456;}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);direction:rtl;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
.logo{font-size:48px;margin-bottom:24px;}
.code{font-size:clamp(80px,20vw,160px);font-weight:900;line-height:1;background:linear-gradient(135deg,var(--amber),#F5C842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
h1{font-size:clamp(20px,4vw,28px);font-weight:700;margin:16px 0 8px;}
p{font-size:14px;color:var(--text-muted);line-height:1.8;max-width:480px;margin-bottom:36px;}
.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;text-decoration:none;transition:all .2s;}
.btn-primary{background:var(--amber);color:#1C1A14;}
.btn-primary:hover{background:#F5A832;}
.btn-outline{background:transparent;color:var(--blue);border:1px solid var(--blue);}
.btn-outline:hover{background:rgba(55,138,221,0.1);}
</style>
</head>
<body>
  <div class="logo">☀</div>
  <div class="code">٤٠٤</div>
  <h1>هذه الصفحة غير موجودة</h1>
  <p>يبدو أن الرابط الذي وصلت إليه غير صحيح أو أن الصفحة نُقلت.<br>لكن شمس النيل لا تزال هنا — عُد للرئيسية وابدأ من جديد.</p>
  <div class="links">
    <a href="/" class="btn btn-primary">العودة للرئيسية</a>
    <a href="/institute.html" class="btn btn-outline">معهد الطاقة الشمسية</a>
  </div>
<script src="i18n.js"></script>
</body>
</html>
