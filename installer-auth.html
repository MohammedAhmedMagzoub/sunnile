<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>بوابة المركّبين — شمس النيل</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#EF9F27">
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --amber:#EF9F27;--amber-dark:#BA7517;
  --blue:#378ADD;
  --green:#27C93F;
  --dark:#1C1A14;--dark2:#252218;--dark3:#2E2A1E;--dark4:#3A3528;
  --text:#F5F0E8;--text-muted:#A89F8C;--text-dim:#6B6456;--border:#3A3528;
}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);direction:rtl;min-height:100vh;display:flex;flex-direction:column;}

/* ── NAV ── */
.site-nav{background:var(--dark2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:99;}
.logo{display:flex;align-items:center;gap:10px;padding:12px 0;text-decoration:none;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--amber),var(--blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#1C1A14;}
.logo-text{display:flex;flex-direction:column;line-height:1.1;}
.logo-ar{font-size:16px;font-weight:700;color:var(--amber);}
.logo-en{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}
.nav-links{display:flex;gap:4px;list-style:none;direction:rtl;}
.nav-links li a{display:block;padding:14px 10px;font-size:12px;color:var(--text-muted);text-decoration:none;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-links li a:hover,.nav-links li a.active{color:var(--amber);border-bottom-color:var(--amber);}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none;}
.nav-toggle span{display:block;width:22px;height:2px;background:var(--text-muted);border-radius:2px;transition:all .3s;}
.nav-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-toggle.open span:nth-child(2){opacity:0;}
.nav-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
@media(max-width:768px){
  .nav-toggle{display:flex;}
  .nav-links{display:none;position:absolute;top:100%;right:0;left:0;background:var(--dark2);border-bottom:1px solid var(--border);flex-direction:column;padding:8px 0;z-index:98;}
  .nav-links.open{display:flex;}
  .nav-links li a{padding:12px 24px;font-size:14px;border-bottom:none;border-right:3px solid transparent;}
  .nav-links li a:hover,.nav-links li a.active{border-right-color:var(--amber);border-bottom:none;}
  .site-nav{position:relative;}
  .logo-ar{font-size:14px;}
}

/* ── AUTH SECTION ── */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.auth-card{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:440px;}
.auth-logo{text-align:center;font-size:48px;margin-bottom:16px;}
.auth-title{text-align:center;font-size:24px;font-weight:700;margin-bottom:8px;}
.auth-sub{text-align:center;font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:28px;}

.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;}
.auth-tab{flex:1;background:none;border:none;padding:12px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
.auth-tab.active{color:var(--amber);border-bottom-color:var(--amber);font-weight:700;}

.field{margin-bottom:20px;}
.field label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:600;}
.field input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;direction:ltr;transition:border-color .2s;}
.field input:focus{outline:none;border-color:var(--amber);}
.field input::placeholder{color:var(--text-dim);}

.btn-auth{width:100%;background:var(--amber);color:#1C1A14;border:none;padding:14px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px;}
.btn-auth:hover{background:#F5A832;}
.btn-auth:disabled{opacity:.6;cursor:not-allowed;}

.auth-msg{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:13px;text-align:center;display:none;line-height:1.6;}
.auth-msg.show{display:block;}
.auth-msg.info{background:rgba(55,138,221,0.1);color:var(--blue);}
.auth-msg.error{background:rgba(224,108,117,0.1);color:#E06C75;}
.auth-msg.success{background:rgba(39,201,63,0.1);color:var(--green);}

.back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);text-decoration:none;}
.back-link:hover{color:var(--amber);}

/* ── FOOTER ── */
.site-footer{background:var(--dark2);border-top:1px solid var(--border);padding:24px;text-align:center;margin-top:auto;}
.footer-logo{font-size:18px;font-weight:900;color:var(--amber);margin-bottom:4px;}
.footer-text{font-size:11px;color:var(--text-dim);}
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="logo">
    <div class="logo-icon">☀</div>
    <div class="logo-text"><span class="logo-ar">شمس النيل</span><span class="logo-en">SunNile</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">الرئيسية</a></li>
    <li><a href="calculator.html">الحاسبة</a></li>
    <li><a href="inverters.html">الإنفرترات</a></li>
    <li><a href="standards.html">المعايير</a></li>
    <li><a href="future.html">مستقبل الطاقة</a></li>
    <li><a href="policy.html">السياسات</a></li>
    <li><a href="institute.html">المعهد</a></li>
    <li><a href="installers.html" class="active">المركّبون</a></li>
    <li><a href="about.html">عن المبادرة</a></li>
  </ul>
  <button class="nav-toggle" id="navToggle" aria-label="فتح القائمة"><span></span><span></span><span></span></button>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🔧</div>
    <h1 class="auth-title">بوابة المركّبين</h1>
    <p class="auth-sub">سجّل دخولك أو أنشئ حساباً لإدارة ملفك في دليل شمس النيل</p>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" type="button">تسجيل الدخول</button>
      <button class="auth-tab" id="tab-signup" type="button">حساب جديد</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="form-login" autocomplete="on">
      <div class="field">
        <label for="login-email">البريد الإلكتروني</label>
        <input type="email" id="login-email" placeholder="example@gmail.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="login-pass">كلمة المرور</label>
        <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-auth" id="btn-login">دخول ←</button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="form-signup" style="display:none" autocomplete="on">
      <div class="field">
        <label for="signup-email">البريد الإلكتروني</label>
        <input type="email" id="signup-email" placeholder="example@gmail.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="signup-pass">كلمة المرور <span style="color:var(--text-dim);font-weight:400;font-size:11px;">(٨ أحرف على الأقل)</span></label>
        <input type="password" id="signup-pass" placeholder="••••••••" required minlength="8" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="signup-pass2">تأكيد كلمة المرور</label>
        <input type="password" id="signup-pass2" placeholder="••••••••" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-auth" id="btn-signup">إنشاء حساب ←</button>
    </form>

    <div id="auth-msg" class="auth-msg"></div>
    <a href="installers.html" class="back-link">← العودة لدليل المركّبين</a>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-logo">شمس النيل ☀</div>
  <p class="footer-text">مبادرة مجانية غير ربحية | sunnile.org</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="i18n.js"></script>
<script>
var SUPABASE_URL = 'https://awacxkhlcoeucdavyoqx.supabase.co';
var SUPABASE_KEY = 'sb_publishable_ZoaUJr4H4s57-XNJgwJUBA_VhBVlzCp';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* Redirect if already logged in */
sb.auth.getSession().then(function(r) {
  if (r.data && r.data.session) location.href = 'installer-dashboard.html';
});

/* ── Message helper ── */
function showMsg(type, text) {
  var el = document.getElementById('auth-msg');
  el.className = 'auth-msg show ' + type;
  el.textContent = text;
}

/* ── Tab switching ── */
document.getElementById('tab-login').addEventListener('click', function() {
  this.classList.add('active');
  document.getElementById('tab-signup').classList.remove('active');
  document.getElementById('form-login').style.display = '';
  document.getElementById('form-signup').style.display = 'none';
  document.getElementById('auth-msg').className = 'auth-msg';
});
document.getElementById('tab-signup').addEventListener('click', function() {
  this.classList.add('active');
  document.getElementById('tab-login').classList.remove('active');
  document.getElementById('form-signup').style.display = '';
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('auth-msg').className = 'auth-msg';
});

/* ── Login ── */
document.getElementById('form-login').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('btn-login');
  btn.disabled = true;
  showMsg('info', 'جاري تسجيل الدخول...');
  var result = await sb.auth.signInWithPassword({
    email: document.getElementById('login-email').value.trim(),
    password: document.getElementById('login-pass').value
  });
  if (result.error) {
    var msg = result.error.message === 'Invalid login credentials'
      ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة'
      : result.error.message;
    showMsg('error', '⚠️ ' + msg);
    btn.disabled = false;
  } else {
    showMsg('success', '✓ تم تسجيل الدخول — جاري التحويل...');
    setTimeout(function() { location.href = 'installer-dashboard.html'; }, 700);
  }
});

/* ── Signup ── */
document.getElementById('form-signup').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('btn-signup');
  var pass  = document.getElementById('signup-pass').value;
  var pass2 = document.getElementById('signup-pass2').value;
  if (pass !== pass2) { showMsg('error', '⚠️ كلمتا المرور غير متطابقتين'); return; }
  btn.disabled = true;
  showMsg('info', 'جاري إنشاء الحساب...');
  var result = await sb.auth.signUp({
    email: document.getElementById('signup-email').value.trim(),
    password: pass
  });
  if (result.error) {
    showMsg('error', '⚠️ ' + result.error.message);
    btn.disabled = false;
  } else if (result.data && result.data.session) {
    /* Email confirmation disabled — directly logged in */
    showMsg('success', '✓ تم إنشاء الحساب — جاري التحويل...');
    setTimeout(function() { location.href = 'installer-dashboard.html'; }, 700);
  } else {
    /* Email confirmation enabled */
    showMsg('success', '✓ تم إنشاء الحساب — تحقق من بريدك الإلكتروني وانقر رابط التأكيد، ثم سجّل دخولك.');
    btn.disabled = false;
  }
});

/* ── Nav hamburger ── */
(function(){
  var btn=document.getElementById('navToggle');
  var nav=document.querySelector('.nav-links');
  if(!btn||!nav)return;
  btn.addEventListener('click',function(){btn.classList.toggle('open');nav.classList.toggle('open');});
  document.addEventListener('click',function(e){
    if(!btn.contains(e.target)&&!nav.contains(e.target)){btn.classList.remove('open');nav.classList.remove('open');}
  });
})();
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js").catch(function(){});}</script>
</body>
</html>
